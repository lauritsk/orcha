[env]
HK_MISE = 1

[tools]
actionlint = "1.7.12"
cocogitto = "7.0.0"
cosign = "3.0.6"
"github:lauritsk/pid" = "0.3.0"
goreleaser = "2.15.4"
hk = "1.44.2"
pkl = "0.31.1"
ruff = "0.15.12"
rumdl = "0.1.83"
syft = "1.43.0"
tombi = "0.9.24"
ty = "0.0.32"
uv = "0.11.7"

[hooks]
postinstall = "hk install --mise"

[tasks.pid]
description = "Run pid with uv"
run = "uv run pid"

[tasks.install]
description = "Install project dependencies"
run = "uv sync --locked --dev"

[tasks.fix]
description = "Run hk-managed fixers across the repository"
depends = ["install"]
run = "hk fix --all"

[tasks.lint]
description = "Run hk-managed checks across the repository"
depends = ["install"]
run = "hk check --all"

[tasks.test]
description = "Run test suite"
depends = ["install"]
run = "uv run pytest"

[tasks.build]
description = "Build project package"
run = "uv build"

[tasks.check]
description = "Run project checks"
depends = ["lint", "test", "build"]

[tasks."release:bump"]
description = "Bump project version"
run = "cog bump --auto"

[tasks."release:publish"]
description = "Publish release"
run = "goreleaser release --clean"
