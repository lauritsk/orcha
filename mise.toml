[env]
HK_MISE = 1

[tools]
hk = "1.44.1"
pkl = "0.31.1"
ruff = "0.15.12"
rumdl = "0.1.83"
tombi = "0.9.24"
ty = "0.0.32"
uv = "0.11.7"

[hooks]
postinstall = "hk install --mise"

[tasks.orcha]
description = "Run orcha with uv"
run = "uv run orcha"

[tasks.fix]
description = "Run hk-managed fixers across the repository"
run = "hk fix --all"

[tasks.lint]
description = "Run hk-managed checks across the repository"
run = "hk check --all"

[tasks.test]
description = "Run test suite"
run = "uv run pytest"

[tasks.build]
description = "Build project package"
run = "uv build"

[tasks.audit]
description = "Audit project dependencies"
run = "uv audit --preview-features audit --locked"

[tasks.check]
description = "Run project checks"
depends = ["lint", "test", "build"]
