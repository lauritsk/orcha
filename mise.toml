[env]
HK_MISE = 1

[tools]
actionlint = "1.7.12"
cocogitto = "7.0.0"
cosign = "3.0.6"
goreleaser = "2.15.4"
hk = "1.44.1"
pkl = "0.31.1"
ruff = "0.15.12"
rumdl = "0.1.83"
syft = "1.43.0"
tombi = "0.9.24"
ty = "0.0.32"
uv = "0.11.7"

[hooks]
postinstall = "hk install --mise"

[tasks.orcha]
description = "Run orcha with uv"
run = "uv run orcha"

[tasks.fix]
description = "Run hk-managed fixers across the repository"
run = "hk fix --all"

[tasks.lint]
description = "Run hk-managed checks across the repository"
run = "uv sync --locked --all-groups && hk check --all"

[tasks.test]
description = "Run test suite"
run = "uv run pytest"

[tasks.build]
description = "Build project package"
run = "uv build"

[tasks.audit]
description = "Audit project dependencies"
run = "uv audit --preview-features audit --locked"

[tasks.check]
description = "Run project checks"
depends = ["lint", "test", "build", "audit"]

[tasks.version]
run = "cog bump --auto"

[tasks.release]
run = "goreleaser release --clean"
