[env]
HK_MISE = 1

[tools]
actionlint = "1.7.12"
cocogitto = "7.0.0"
cosign = "3.0.6"
"github:lauritsk/pid" = "0.12.0"
goreleaser = "2.15.4"
hk = "1.44.3"
pkl = "0.31.1"
ruff = "0.15.12"
rumdl = "0.1.87"
shellcheck = "0.11.0"
syft = "1.44.0"
tombi = "0.10.2"
ty = "0.0.34"
uv = "0.11.8"
shfmt = "3.13.1"

[hooks]
postinstall = "hk install --mise"

[tasks.pid]
description = "Run pid with uv"
run = "uv run pid"

[tasks.install]
description = "Install project dependencies"
run = "uv sync --locked --dev"

[tasks.fix]
description = "Run hk-managed fixers across the repository"
depends = ["install"]
run = "hk fix --all"

[tasks.lint]
description = "Run hk-managed checks across the repository"
depends = ["install"]
run = "hk check --all"

[tasks.test]
description = "Run test suite with coverage gate"
depends = ["install"]
run = "uv run pytest -n auto --cov=pid --cov-report=term-missing --cov-fail-under=95"

[tasks.build]
description = "Build project package"
run = "uv build"

[tasks.check]
description = "Run project checks"
depends = ["lint", "test", "build"]

[tasks."release:bump"]
description = "Bump project version"
run = "cog bump --auto"

[tasks."release:publish"]
description = "Publish release"
run = "goreleaser release --clean"
