[project]
name = "orcha"
version = "0.1.0"
description = "agent orchestration tool"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "textual[syntax]>=8.2.4",
]

[dependency-groups]
dev = [
    "hypothesis>=6.152.3",
    "pytest>=9.0.3",
    "textual-dev>=1.8.0",
]

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"
